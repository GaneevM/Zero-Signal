<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Circuit Simulator</title>
<style>body{margin:0;background:#10131a;color:white;font-family:Arial,sans-serif}header{text-align:center;padding:18px}.wrap{display:grid;grid-template-columns:280px 1fr;gap:16px;max-width:1200px;margin:auto;padding:16px}.panel{background:#1d2434;border:1px solid #3b4660;border-radius:18px;padding:16px}button,input{padding:10px;margin:5px;border-radius:10px;border:1px solid #46536f;background:#121827;color:white}button.active,button:hover{background:#65e2ff;color:#061018}canvas{width:100%;background:#f7f9ff;border-radius:18px}@media(max-width:850px){.wrap{grid-template-columns:1fr}}</style></head>
<body><header><h1>⚡ Circuit Simulator</h1><p>Place a battery, wires, resistors, bulbs, and switches. Then run the circuit.</p></header><div class="wrap"><aside class="panel"><h2>Tools</h2><div id="tools"></div><p>Click grid points to place parts. Wire uses two clicks.</p><label>Voltage <input id="volts" value="9" size="5"></label><label>Resistance <input id="ohms" value="100" size="5"></label><button id="run">Run Simulation</button><button id="clear">Clear</button><p id="info"></p></aside><main><canvas id="c" width="860" height="620"></canvas></main></div>
<script>
const ctx=c.getContext("2d"),toolsArr=["wire","battery","resistor","bulb","switch","erase"],parts=[],wires=[];let tool="wire",first=null,sim={current:0,ok:false};
tools.innerHTML=toolsArr.map(t=>`<button data-t="${t}">${t}</button>`).join("");tools.onclick=e=>{if(e.target.dataset.t){tool=e.target.dataset.t;renderTools();first=null}};function renderTools(){document.querySelectorAll("[data-t]").forEach(b=>b.classList.toggle("active",b.dataset.t===tool))}renderTools();
function snap(x,y){const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;return [Math.round((x-r.left)*sx/32),Math.round((y-r.top)*sy/32)]}function px(p){return p[0]*32}function py(p){return p[1]*32}
c.onclick=e=>{let p=snap(e.clientX,e.clientY);if(tool==="erase"){for(let i=parts.length-1;i>=0;i--)if(Math.hypot(px(parts[i].p)-px(p),py(parts[i].p)-py(p))<25)parts.splice(i,1);return draw()}if(tool==="wire"){if(!first){first=p}else{wires.push([first,p]);first=null}return draw()}let type=tool, val=type==="battery"?+volts.value:+ohms.value;parts.push({type,p,val,on:true});draw()};
run.onclick=()=>{let battery=parts.find(p=>p.type==="battery"),load=parts.filter(p=>["resistor","bulb"].includes(p.type));let sw=parts.find(p=>p.type==="switch");if(!battery||!load.length){info.textContent="Add at least one battery and one resistor/bulb.";sim.ok=false}else if(sw&&sw.on===false){info.textContent="Switch is open. No current flows.";sim.ok=false}else{let r=load.reduce((a,b)=>a+(+b.val||50),0);sim.current=(+battery.val||9)/r;sim.ok=true;info.textContent=`Current ≈ ${sim.current.toFixed(3)} A. Bulbs glow based on current.`}draw()};
clear.onclick=()=>{parts.length=0;wires.length=0;first=null;sim.ok=false;info.textContent="";draw()};
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#f7f9ff";ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle="#d7ddec";ctx.lineWidth=1;for(let x=0;x<c.width;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}for(let y=0;y<c.height;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke()}ctx.strokeStyle=sim.ok?"#ffb703":"#222";ctx.lineWidth=5;wires.forEach(w=>{ctx.beginPath();ctx.moveTo(px(w[0]),py(w[0]));ctx.lineTo(px(w[1]),py(w[1]));ctx.stroke()});if(first){ctx.fillStyle="#ff6b7c";ctx.beginPath();ctx.arc(px(first),py(first),8,0,7);ctx.fill()}parts.forEach(p=>{let x=px(p.p),y=py(p.p);ctx.fillStyle="#1b2438";ctx.strokeStyle="#222";ctx.lineWidth=3;if(p.type==="battery"){ctx.fillRect(x-18,y-24,36,48);ctx.fillStyle="#65e2ff";ctx.fillText((p.val||9)+"V",x-13,y+5)}if(p.type==="resistor"){ctx.strokeRect(x-32,y-12,64,24);ctx.fillStyle="#222";ctx.fillText((p.val||100)+"Ω",x-28,y+5)}if(p.type==="bulb"){let glow=sim.ok?Math.min(1,sim.current*15):0;ctx.fillStyle=`rgba(255,210,70,${.25+glow*.75})`;ctx.beginPath();ctx.arc(x,y,24+glow*14,0,7);ctx.fill();ctx.strokeStyle="#222";ctx.beginPath();ctx.arc(x,y,22,0,7);ctx.stroke();ctx.fillStyle="#222";ctx.fillText("bulb",x-14,y+5)}if(p.type==="switch"){ctx.strokeStyle=p.on?"#00aa55":"#cc3344";ctx.beginPath();ctx.moveTo(x-25,y);ctx.lineTo(x+25,p.on?y:y-18);ctx.stroke();ctx.fillStyle="#222";ctx.fillText(p.on?"ON":"OFF",x-16,y+24);p.on=!p.clicked}});ctx.fillStyle="#222";ctx.font="16px Arial"}draw();
</script></body></html>
